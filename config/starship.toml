# --- Hacker Flair w/ Right Prompt ---
add_newline = true

# LEFT SIDE (main prompt)
format = """
[┌](bold green) $hostname$directory$git_branch$git_status$cmd_duration
[└](bold green)$character
"""

# RIGHT SIDE (status HUD)
right_format = "$python$ruby$nodejs$docker_context$time"

# -----------------------------
# Directory
# -----------------------------
[directory]
truncation_length = 3
truncate_to_repo = true
style = "bold cyan"
read_only = " "
read_only_style = "bold red"
format = "[$path]($style)[$read_only]($read_only_style) "

# -----------------------------
# Git
# -----------------------------
[git_branch]
symbol = " "
style = "bold magenta"
format = "[$symbol$branch]($style) "

[git_status]
style = "bold red"
format = "[$all_status$ahead_behind]($style) "
conflicted = "⚔ "
untracked = "✚ "
modified = "✎ "
staged = "✔ "
renamed = "➜ "
deleted = "✘ "
ahead = "⇡${count} "
behind = "⇣${count} "
diverged = "⇕⇡${ahead_count}⇣${behind_count} "

# -----------------------------
# SSH Hostname (only visible in remote sessions)
# -----------------------------
[hostname]
ssh_only = true
format = "[$hostname](bold yellow):"
trim_at = "."

# -----------------------------
# Command Status
# -----------------------------
[cmd_duration]
min_time = 500
format = "[⏱ $duration]($style) "
style = "bold yellow"

[status]
disabled = false
format = "[✖ $status]($style) "
style = "bold red"

[character]
success_symbol = "[❯❯](bold green)"
error_symbol = "[❯❯](bold red)"
vimcmd_symbol = "[❮❮](bold yellow)"

# -----------------------------
# Right-side modules
# -----------------------------
[time]
disabled = false
time_format = "%H:%M"
format = "[ $time]($style) "
style = "bold bright-black"

[docker_context]
format = "[🐳 $context]($style) "
style = "bold blue"

[python]
symbol = " "
format = "[$symbol$version]($style) "
style = "bold blue"

[ruby]
symbol = "💎 "
format = "[$symbol$version]($style) "
style = "bold red"

[nodejs]
symbol = " "
format = "[$symbol$version]($style) "
style = "bold green"